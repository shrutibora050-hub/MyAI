version: '3.8'

services:
  api-gateway:
    build: .
    image: job-api-gateway:latest
    container_name: job-api-gateway
    ports:
      - "8002:8002"
    networks:
      - database_default
    environment:
      - DATABASE_URL=postgresql://scraper:scraper_password@jobs-postgres:5432/jobs_db
    restart: unless-stopped

networks:
  database_default:
    external: true
