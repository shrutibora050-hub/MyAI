version: '3.8'

services:
  graphql-server:
    build: .
    image: job-scraper:latest
    container_name: job-scraper-graphql
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
    restart: unless-stopped

  scraper-cli:
    image: job-scraper:latest
    container_name: job-scraper-cli
    volumes:
      - ./output:/app/output
    command: python main.py --companies amazon,simplify --limit 50
    profiles:
      - cli
