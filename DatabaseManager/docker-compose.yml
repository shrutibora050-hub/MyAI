services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: job-rabbitmq
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    env_file:
      - .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - job-network

  database-manager:
    build: .
    container_name: database-manager
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - job-network
    restart: unless-stopped

volumes:
  rabbitmq_data:

networks:
  job-network:
    external: true
    name: database_default
